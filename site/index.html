<!DOCTYPE html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#66ccff" />
    <!-- The UI is English and the upstream timestamp is shown verbatim; keep
         browsers from auto-translating it (e.g. into the phone's UI language). -->
    <meta name="google" content="notranslate" />
    <title>Downtown Madison Public Parking</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.png?v=__ICON_HASH__" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png?v=__ICON_HASH__" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="refresh-indicator"></div>
    <header>
      <h1>Downtown Madison Public Parking</h1>
      <p class="meta">
        Updated: <span id="modified">…</span>
      </p>
      <p class="status-row">
        <span id="status" class="status"></span>
        <span id="refresh-progress" class="refresh-progress" aria-hidden="true">
          <span id="refresh-progress-bar"></span>
        </span>
        <span id="refresh-label" class="refresh-label"></span>
      </p>
    </header>

    <main>
      <div id="cards" class="cards"></div>
    </main>

    <footer>
      <p>
        Live vacancy counts from the
        <a
          href="https://www.cityofmadison.com/parking/garages-lots/current-hourly-parking-availability"
          target="_blank"
          rel="noopener"
          >City of Madison</a
        >. Tap the chart icon (📈/📉/〰️) for a garage's trends (tap again to
        close), 🗺️ for its map. Use ▲▼ to reorder, − to minimize a garage you
        don't need (tap its row to restore). Pull down to refresh.
      </p>
    </footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
