<!DOCTYPE html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#66ccff" />
    <!-- The UI is English; keep browsers from auto-translating it (e.g. into the
         phone's UI language). -->
    <meta name="google" content="notranslate" />
    <title>Downtown Madison Public Parking</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.png?v=__ICON_HASH__" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png?v=__ICON_HASH__" />
    <link rel="stylesheet" href="./style.css" />
    <!-- Apply the saved theme and appearance before first paint so a stored
         choice doesn't flash the default. app.js owns the rest of the switching;
         this only needs to set the attributes the stylesheet keys off. The
         scheme is always resolved to light/dark here (system preference unless
         forced), so the stylesheet needs no prefers-color-scheme query. -->
    <script>
      (function () {
        var el = document.documentElement;
        var scheme;
        try {
          if (localStorage.getItem("parking:theme") === "terminal") {
            el.dataset.theme = "terminal";
          }
          scheme = localStorage.getItem("parking:color-scheme");
        } catch (e) {}
        if (scheme !== "light" && scheme !== "dark") {
          scheme = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        el.dataset.scheme = scheme;
      })();
    </script>
  </head>
  <body>
    <div id="refresh-indicator"></div>
    <header>
      <h1>Downtown Madison Public Parking</h1>
      <p class="meta">
        Updated: <span id="modified">…</span><span id="modified-ago" class="modified-ago"></span>
      </p>
      <p class="status-row">
        <span id="status" class="status"></span>
        <span id="refresh-progress" class="refresh-progress" aria-hidden="true">
          <span id="refresh-progress-bar"></span>
        </span>
        <span id="refresh-label" class="refresh-label"></span>
      </p>
    </header>

    <main>
      <div id="cards" class="cards"></div>
    </main>

    <footer>
      <p>
        Live vacancy counts from the
        <a
          href="https://www.cityofmadison.com/parking/garages-lots/current-hourly-parking-availability"
          target="_blank"
          rel="noopener"
          >City of Madison</a
        >. Tap the chart icon (📈/📉/〰️) for a garage's trends (tap again to
        close), 🗺️ for its map. Use ▲▼ to reorder, − to minimize a garage you
        don't need (tap its ＋ to restore). Pull down to refresh.
      </p>
      <p id="stats-status" class="stats-status"></p>
      <p class="pref-row">
        <label for="theme-select">Theme</label>
        <select id="theme-select" class="pref-select">
          <option value="default">Default</option>
          <option value="terminal">Terminal</option>
          <option value="geocities">GeoCities</option>
        </select>
      </p>
      <p class="pref-row">
        <label for="scheme-select">Appearance</label>
        <select id="scheme-select" class="pref-select">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </p>
      <p id="install-hint" class="install-hint" hidden></p>
      <details class="debug">
        <summary>Debug</summary>
        <p id="build-stamp" class="build-stamp"></p>
        <p id="cache-size" class="build-stamp"></p>
        <button id="reset-data" type="button" class="reset-data">
          Reset app data &amp; reload
        </button>
      </details>
    </footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
