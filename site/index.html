<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Madison Parking</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="refresh-indicator"></div>
    <header>
      <h1>Downtown Parking</h1>
      <p class="meta">
        Updated: <span id="modified">…</span>
      </p>
      <p id="status" class="status"></p>
    </header>

    <main>
      <section id="favorites-section">
        <h2>Favorites</h2>
        <p id="favorites-empty" class="hint" hidden>
          Tap ☆ on any garage below to pin it here.
        </p>
        <div id="favorites" class="grid favorites-grid"></div>
      </section>

      <section id="others-section">
        <h2>Other garages</h2>
        <div id="others" class="grid others-grid"></div>
      </section>
    </main>

    <footer>
      <p>Live vacancy counts. Data from the City of Madison. Pull down to refresh.</p>
    </footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
