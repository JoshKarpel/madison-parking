name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Run tests
        run: node test/run.mjs

  deploy-site:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Configure Pages
        uses: actions/configure-pages@v6.0.0

      # Stamp the commit SHA into every file that carries the __BUILD_ID__ token
      # (the service worker's cache name and the client's version.js), so each
      # deploy installs a fresh worker + shell cache and discards derived client
      # caches whose shape may have changed. Otherwise clients keep serving the
      # cached shell and stale-shaped cached data.
      - name: Stamp build id
        run: grep -rl __BUILD_ID__ site | xargs sed -i "s/__BUILD_ID__/${{ github.sha }}/g"

      # Stamp a content hash of the icon PNGs into their ?v= query so the icon
      # URL changes only when the icon actually changes. That's what lets Android
      # re-mint the installed PWA's WebAPK (a same-URL byte swap is not detected),
      # without churning the icon on every unrelated deploy the way __BUILD_ID__
      # would. Hashing the committed PNGs (not the SVG) versions the exact bytes
      # served, independent of the rasterizer.
      - name: Stamp icon version
        run: |
          ICON_HASH=$(cat site/icons/icon-192.png site/icons/icon-512.png | sha256sum | cut -c1-12)
          grep -rl __ICON_HASH__ site | xargs sed -i "s/__ICON_HASH__/${ICON_HASH}/g"

      - name: Upload site/ artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0

  deploy-worker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      # Requires a repo secret CLOUDFLARE_API_TOKEN. The "Edit Cloudflare
      # Workers" template is NOT enough on its own: the token also needs an
      # "Account > D1 > Edit" permission, both to apply the migrations below and
      # because the Worker binds a D1 database. Missing it fails with code 7403.
      # See worker/README.md.
      #
      # preCommands applies any new D1 migrations before the deploy. It's
      # idempotent: wrangler tracks applied migrations in d1_migrations and skips
      # them, so this is a no-op when the schema is already current. Migrations
      # here are additive, so running them before the new code is safe.
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v4.0.0
        # Surface wrangler's full API error detail in the job log instead of only
        # its on-runner log file, so failures (e.g. a Cloudflare API error code)
        # are visible in CI.
        env:
          WRANGLER_LOG: debug
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: worker
          preCommands: npx wrangler d1 migrations apply madison-parking --remote
