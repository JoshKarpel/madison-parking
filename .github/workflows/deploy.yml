name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Run tests
        run: node test/run.mjs

  deploy-site:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Configure Pages
        uses: actions/configure-pages@v6.0.0

      # Stamp the commit SHA into the service worker so each deploy installs a
      # fresh worker + cache, otherwise clients keep serving the cached shell.
      - name: Stamp service worker cache version
        run: sed -i "s/__BUILD_ID__/${{ github.sha }}/" site/sw.js

      - name: Upload site/ artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0

  deploy-worker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      # Requires a repo secret CLOUDFLARE_API_TOKEN with the "Edit Cloudflare
      # Workers" permission (includes D1). See worker/README.md.
      #
      # preCommands applies any new D1 migrations before the deploy. It's
      # idempotent: wrangler tracks applied migrations in d1_migrations and skips
      # them, so this is a no-op when the schema is already current. Migrations
      # here are additive, so running them before the new code is safe.
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: worker
          preCommands: npx wrangler d1 migrations apply madison-parking --remote
